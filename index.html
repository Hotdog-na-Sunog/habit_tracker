<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>habit.</title>

    <!-- ── iOS PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="habit.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#F7F6F2">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjRjdGNkYyIi8+PHRleHQgeD0iNDQiIHk9IjEyNSIgZm9udC1mYW1pbHk9Ikdlb3JnaWEsc2VyaWYiIGZvbnQtc2l6ZT0iOTIiIGZvbnQtd2VpZ2h0PSIzMDAiIGZpbGw9IiMxQzFDMUEiPmg8L3RleHQ+PGNpcmNsZSBjeD0iMTM4IiBjeT0iNTgiIHI9IjE4IiBmaWxsPSIjNUI3QTVGIi8+PC9zdmc+">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🌿</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Lexend:wght@100..900&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F7F6F2;
            --surface: #FFFFFF;
            --surface2: #F2F1ED;
            --text: #1C1C1A;
            --text2: #8A8880;
            --text3: #B8B6B0;
            --accent: #5B7A5F;
            --accent-light: #EBF0EB;
            --accent-mid: #A8C2AB;
            --border: #E8E7E2;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.10);
            --radius: 16px;
            --radius-sm: 10px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100dvh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0 18px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -0.5px;
            user-select: none;
        }

        .logo span {
            color: var(--accent);
        }

        .db-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 9.5px;
            color: var(--text3);
            background: var(--surface2);
            border-radius: 100px;
            padding: 3px 9px;
            margin-left: 8px;
            font-weight: 500;
        }

        .db-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 16px;
        }

        .month-nav button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text2);
            font-size: 18px;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 6px;
            transition: color .2s, background .2s;
        }

        .month-nav button:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .month-label {
            font-weight: 500;
            font-size: 14px;
            color: var(--text);
            min-width: 112px;
            text-align: center;
        }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 10px 20px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
        }

        .btn-add:hover {
            opacity: .88;
        }

        .btn-add:active {
            transform: scale(.97);
        }

        /* ── BODY ── */
        .body {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 22px;
            padding: 22px 0;
            overflow: hidden;
            min-height: 0;
        }

        /* ── LEFT ── */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow: hidden;
        }

        .stats-row {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 15px 17px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-card.accent-card {
            background: var(--accent);
            border-color: var(--accent);
        }

        .stat-label {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--text2);
        }

        .accent-card .stat-label {
            color: rgba(255, 255, 255, .7);
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 30px;
            font-weight: 300;
            line-height: 1;
            color: var(--text);
        }

        .accent-card .stat-value {
            color: white;
        }

        .stat-sub {
            font-size: 11.5px;
            color: var(--text3);
            margin-top: 2px;
        }

        .accent-card .stat-sub {
            color: rgba(255, 255, 255, .6);
        }

        .stat-icon {
            font-size: 21px;
            opacity: .5;
        }

        .ring-wrap {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .ring-svg {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, .2);
            stroke-width: 4;
        }

        .ring-fill {
            fill: none;
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dashoffset .6s ease;
        }

        .ring-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10.5px;
            font-weight: 500;
            color: white;
        }

        .habits-section {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 11px;
        }

        .habits-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 7px;
            padding-right: 3px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .habit-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: border-color .2s, box-shadow .2s;
            animation: fadeUp .25s ease;
        }

        .habit-item:hover {
            border-color: var(--accent-mid);
            box-shadow: var(--shadow);
        }

        .habit-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .habit-info {
            flex: 1;
            min-width: 0;
        }

        .habit-name {
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .habit-streak {
            font-size: 10.5px;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 3px;
            margin-top: 1px;
        }

        .habit-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity .2s;
        }

        .habit-item:hover .habit-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text3);
            font-size: 13px;
            padding: 4px;
            border-radius: 6px;
            transition: color .2s, background .2s;
        }

        .action-btn:hover {
            color: #D94F4F;
            background: #FEF2F2;
        }

        .empty-habits {
            text-align: center;
            padding: 30px 16px;
            color: var(--text3);
            font-size: 13px;
            line-height: 1.8;
        }

        .empty-habits .big {
            font-size: 26px;
            margin-bottom: 6px;
        }

        /* ── RIGHT ── */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow: hidden;
        }

        .progress-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 17px 19px;
        }

        .progress-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
            margin-top: 13px;
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .progress-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .progress-pct {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .progress-bar-bg {
            height: 5px;
            background: var(--surface2);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 100px;
            transition: width .6s ease;
        }

        .calendar-section {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 17px 19px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 5px;
        }

        .weekday {
            text-align: center;
            font-size: 9.5px;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--text3);
            padding: 4px 0;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            flex: 1;
        }

        .cal-day {
            border-radius: 9px;
            border: 1.5px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color .2s, background .2s, transform .15s;
            padding: 3px 2px;
            gap: 2px;
        }

        .cal-day:hover {
            border-color: var(--accent-mid);
            background: var(--accent-light);
        }

        .cal-day:active {
            transform: scale(.93);
        }

        .cal-day.empty,
        .cal-day.future {
            cursor: default;
        }

        .cal-day.empty:hover,
        .cal-day.future:hover {
            border-color: transparent;
            background: transparent;
        }

        .cal-day.today {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .cal-day.all-done {
            background: var(--accent-light);
        }

        .day-num {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            line-height: 1;
        }

        .cal-day.empty .day-num,
        .cal-day.future .day-num {
            color: var(--text3);
        }

        .day-dots {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 100%;
        }

        .day-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── DAY MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(28, 28, 26, .4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
            padding: 24px;
            padding-bottom: calc(24px + var(--safe-bottom));
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 26px;
            transform: translateY(24px);
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 400;
        }

        .modal-close {
            background: var(--surface2);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            transition: background .2s;
        }

        .modal-close:hover {
            background: var(--border);
        }

        .modal-date {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 18px;
        }

        .modal-habits {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 340px;
            overflow-y: auto;
        }

        .modal-habit {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }

        .modal-habit-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-habit-name {
            font-size: 14px;
            font-weight: 500;
        }

        .checkmark {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background .2s, border-color .2s;
            flex-shrink: 0;
        }

        .modal-habit.checked .checkmark {
            border-color: transparent;
            color: white;
        }

        .modal-empty {
            text-align: center;
            padding: 20px;
            color: var(--text3);
            font-size: 13px;
        }

        /* ── ADD MODAL ── */
        .add-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(28, 28, 26, .4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
            padding: 24px;
        }

        .add-modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .add-modal {
            background: var(--surface);
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            padding: 26px;
            transform: scale(.94);
            transition: transform .3s cubic-bezier(.34, 1.56, .64, 1);
            box-shadow: var(--shadow-lg);
        }

        .add-modal-overlay.open .add-modal {
            transform: scale(1);
        }

        .add-modal h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            color: var(--text);
            outline: none;
            transition: border-color .2s;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: white;
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-swatch {
            width: 27px;
            height: 27px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: transform .15s, border-color .15s;
        }

        .color-swatch:hover {
            transform: scale(1.15);
        }

        .color-swatch.selected {
            border-color: var(--text);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .btn-cancel {
            flex: 1;
            background: var(--surface2);
            color: var(--text2);
            border: none;
            border-radius: 100px;
            padding: 12px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
        }

        .btn-cancel:hover {
            background: var(--border);
        }

        .btn-save {
            flex: 2;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 12px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .2s;
        }

        .btn-save:hover {
            opacity: .88;
        }

        /* ── LOADING ── */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity .4s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 300;
        }

        .loading-logo span {
            color: var(--accent);
        }

        .loading-sub {
            font-size: 12px;
            color: var(--text3);
            margin-top: 8px;
            letter-spacing: .05em;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: calc(32px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: white;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            z-index: 999;
            transition: transform .3s ease;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">habit<span>.</span></div>
        <div class="loading-sub">loading your data…</div>
    </div>

    <div class="app" style="opacity:0;transition:opacity .4s" id="mainApp">
        <header>
            <div style="display:flex;align-items:center">
                <div class="logo">habit<span>.</span></div>
            </div>
            <div class="header-right">
                <div class="month-nav">
                    <button onclick="changeMonth(-1)">&#8249;</button>
                    <span class="month-label" id="monthLabel"></span>
                    <button onclick="changeMonth(1)">&#8250;</button>
                </div>
                <button class="btn-add" onclick="openAddModal()">+ New Habit</button>
            </div>
        </header>

        <div class="body">
            <div class="left-panel">
                <div class="stats-row">
                    <div class="stat-card accent-card">
                        <div>
                            <div class="stat-label">Today's Progress</div>
                            <div class="stat-value" id="todayVal">—</div>
                            <div class="stat-sub" id="todaySub">habits completed</div>
                        </div>
                        <div class="ring-wrap">
                            <svg class="ring-svg" viewBox="0 0 48 48" width="48" height="48">
                                <circle class="ring-bg" cx="24" cy="24" r="20" />
                                <circle class="ring-fill" id="ringFill" cx="24" cy="24" r="20" stroke-dasharray="125.66"
                                    stroke-dashoffset="125.66" />
                            </svg>
                            <div class="ring-text" id="ringPct">0%</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Most Productive</div>
                            <div class="stat-value" id="prodDay">—</div>
                            <div class="stat-sub">best day of week</div>
                        </div>
                        <div class="stat-icon">📈</div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">Best Streak</div>
                            <div class="stat-value" id="bestStreak">0</div>
                            <div class="stat-sub">days in a row</div>
                        </div>
                        <div class="stat-icon">🔥</div>
                    </div>
                    <div class="stat-card">
                        <div>
                            <div class="stat-label">This Month</div>
                            <div class="stat-value" id="monthTotal">0</div>
                            <div class="stat-sub" id="monthSub">completions</div>
                        </div>
                        <div class="stat-icon">📅</div>
                    </div>
                </div>
                <div class="habits-section">
                    <div class="section-title">My Habits</div>
                    <div class="habits-list" id="habitsList"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="progress-section">
                    <div class="section-title">Monthly Progress</div>
                    <div class="progress-grid" id="progressGrid"></div>
                </div>
                <div class="calendar-section">
                    <div class="section-title">Calendar</div>
                    <div class="weekdays">
                        <div class="weekday">Sun</div>
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                    </div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Day Modal -->
    <div class="modal-overlay" id="dayModal" onclick="closeDayModal(event)">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle"></div>
                <button class="modal-close" onclick="closeDayModalBtn()">✕</button>
            </div>
            <div class="modal-date" id="modalDate"></div>
            <div class="modal-habits" id="modalHabits"></div>
        </div>
    </div>

    <!-- Add Habit Modal -->
    <div class="add-modal-overlay" id="addModal" onclick="closeAddModal(event)">
        <div class="add-modal">
            <h2>New Habit</h2>
            <div class="form-group">
                <label class="form-label">Habit Name</label>
                <input class="form-input" id="habitNameInput" placeholder="e.g. Morning run, Read 20 pages…"
                    maxlength="40">
            </div>
            <div class="form-group">
                <label class="form-label">Color</label>
                <div class="color-picker" id="colorPicker"></div>
            </div>
            <div class="form-actions">
                <button class="btn-cancel" onclick="closeAddModalBtn()">Cancel</button>
                <button class="btn-save" onclick="saveHabit()">Add Habit</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ══════════════════════════════════════════
        //  IndexedDB LAYER
        // ══════════════════════════════════════════
        const DB_NAME = 'HabitTrackerDB';
        const DB_VERSION = 1;
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = e => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('habits'))
                        d.createObjectStore('habits', { keyPath: 'id' });
                    if (!d.objectStoreNames.contains('completions'))
                        d.createObjectStore('completions', { keyPath: 'dateKey' });
                };
                req.onsuccess = e => { db = e.target.result; resolve(db); };
                req.onerror = e => reject(e.target.error);
            });
        }

        function idbGetAll(store) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const req = tx.objectStore(store).getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        function idbPut(store, obj) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).put(obj);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        function idbDelete(store, key) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readwrite');
                const req = tx.objectStore(store).delete(key);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        // ══════════════════════════════════════════
        //  APP STATE
        // ══════════════════════════════════════════
        const COLORS = [
            '#5B7A5F', '#7A6EA8', '#C97B5A', '#5A8FA8', '#A87A7A',
            '#7A9B5A', '#A86E8F', '#5A7AA8', '#C2A05A', '#8A7A5A'
        ];

        let habits = [];
        let completions = {};
        let viewYear = new Date().getFullYear();
        let viewMonth = new Date().getMonth();
        let selColor = COLORS[0];
        let selDay = null;

        // ── LOAD ──
        async function loadData() {
            const rawH = await idbGetAll('habits');
            habits = rawH.sort((a, b) => (a.order || 0) - (b.order || 0));
            const rawC = await idbGetAll('completions');
            completions = {};
            rawC.forEach(r => { completions[r.dateKey] = r.habitIds; });
        }

        async function saveCompletion(dk) {
            const ids = completions[dk] || [];
            if (ids.length === 0) await idbDelete('completions', dk);
            else await idbPut('completions', { dateKey: dk, habitIds: ids });
        }

        // ── DATE HELPERS ──
        function dk(y, m, d) { return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }
        function todayKey() { const n = new Date(); return dk(n.getFullYear(), n.getMonth(), n.getDate()); }
        function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
        function firstDay(y, m) { return new Date(y, m, 1).getDay(); }

        // ── STREAK ──
        function getStreak(hid) {
            const t = new Date(); let s = 0;
            for (let i = 0; i < 365; i++) {
                const d = new Date(t); d.setDate(t.getDate() - i);
                const k = dk(d.getFullYear(), d.getMonth(), d.getDate());
                if (completions[k] && completions[k].includes(hid)) s++;
                else { if (i === 0) continue; break; }
            }
            return s;
        }
        function bestStreak() {
            return habits.length ? Math.max(...habits.map(h => getStreak(h.id))) : 0;
        }

        // ── RENDER ──
        function render() {
            renderMonthLabel(); renderStats();
            renderHabits(); renderProgress(); renderCalendar();
        }

        function renderMonthLabel() {
            const M = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthLabel').textContent = `${M[viewMonth]} ${viewYear}`;
        }

        function renderStats() {
            const tk = todayKey();
            const done = completions[tk] ? completions[tk].length : 0;
            const tot = habits.length;
            const pct = tot ? Math.round(done / tot * 100) : 0;

            document.getElementById('todayVal').textContent = `${done}/${tot}`;
            document.getElementById('todaySub').textContent = (tot - done) > 0 ? `${tot - done} left to complete` : 'all done today!';
            document.getElementById('ringPct').textContent = pct + '%';
            document.getElementById('bestStreak').textContent = bestStreak();
            document.getElementById('ringFill').style.strokeDashoffset = 125.66 - 125.66 * pct / 100;

            // Most Productive Day
            const dayCounts = [0, 0, 0, 0, 0, 0, 0];
            Object.keys(completions).forEach(k => {
                const [y, m, d] = k.split('-').map(Number);
                const day = new Date(y, m - 1, d).getDay();
                dayCounts[day] += completions[k].length;
            });
            const maxVal = Math.max(...dayCounts);
            const bestDayIdx = maxVal > 0 ? dayCounts.indexOf(maxVal) : -1;
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            document.getElementById('prodDay').textContent = bestDayIdx !== -1 ? days[bestDayIdx] : '—';

            let mc = 0;
            for (let d = 1; d <= daysInMonth(viewYear, viewMonth); d++) {
                const k = dk(viewYear, viewMonth, d);
                if (completions[k]) mc += completions[k].length;
            }
            document.getElementById('monthTotal').textContent = mc;
            const mn = new Date(viewYear, viewMonth).toLocaleString('default', { month: 'short' });
            document.getElementById('monthSub').textContent = `completions in ${mn}`;
        }

        function renderHabits() {
            const el = document.getElementById('habitsList');
            if (!habits.length) {
                el.innerHTML = `<div class="empty-habits"><div class="big">🌱</div>No habits yet.<br>Add one to get started!</div>`;
                return;
            }
            el.innerHTML = habits.map(h => {
                const s = getStreak(h.id);
                return `
      <div class="habit-item">
        <div class="habit-dot" style="background:${h.color}"></div>
        <div class="habit-info">
          <div class="habit-name">${esc(h.name)}</div>
          <div class="habit-streak">🔥 ${s} day streak</div>
        </div>
        <div class="habit-actions">
          <button class="action-btn" onclick="deleteHabit('${h.id}',event)">🗑</button>
        </div>
      </div>`;
            }).join('');
        }

        function renderProgress() {
            const el = document.getElementById('progressGrid');
            if (!habits.length) { el.innerHTML = '<div style="color:var(--text3);font-size:13px">No habits yet.</div>'; return; }
            const now = new Date();
            const isCur = viewYear === now.getFullYear() && viewMonth === now.getMonth();
            const maxD = isCur ? now.getDate() : daysInMonth(viewYear, viewMonth);
            el.innerHTML = habits.map(h => {
                let c = 0;
                for (let d = 1; d <= maxD; d++) {
                    const k = dk(viewYear, viewMonth, d);
                    if (completions[k] && completions[k].includes(h.id)) c++;
                }
                const pct = maxD ? Math.round(c / maxD * 100) : 0;
                return `
      <div>
        <div class="progress-header">
          <div class="progress-name">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${h.color};flex-shrink:0"></span>
            ${esc(h.name)}
          </div>
          <div class="progress-pct">${pct}%</div>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%;background:${h.color}"></div>
        </div>
      </div>`;
            }).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calGrid');
            const days = daysInMonth(viewYear, viewMonth);
            const fd = firstDay(viewYear, viewMonth);
            const today = new Date();
            const isCur = viewYear === today.getFullYear() && viewMonth === today.getMonth();
            const todD = today.getDate();
            let html = '';
            for (let i = 0; i < fd; i++) html += '<div class="cal-day empty"></div>';
            for (let d = 1; d <= days; d++) {
                const k = dk(viewYear, viewMonth, d);
                const done = completions[k] || [];
                const future = isCur ? d > todD : new Date(viewYear, viewMonth, d) > today;
                const isToday = isCur && d === todD;
                const allDone = habits.length > 0 && done.length === habits.length;
                let dots = '';
                done.forEach(hid => {
                    const h = habits.find(x => x.id === hid);
                    if (h) dots += `<div class="day-dot" style="background:${h.color}"></div>`;
                });
                let cls = 'cal-day' + (isToday ? ' today' : future ? ' future' : '') + (allDone && !future ? ' all-done' : '');
                html += `<div class="${cls}" onclick="${future ? '' : `openDay(${d})`}">
      <div class="day-num">${d}</div>
      <div class="day-dots">${dots}</div>
    </div>`;
            }
            grid.innerHTML = html;
        }

        // ── MONTH NAV ──
        function changeMonth(dir) {
            viewMonth += dir;
            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            render();
        }

        // ── DAY MODAL ──
        function openDay(d) {
            selDay = d;
            const k = dk(viewYear, viewMonth, d);
            const done = completions[k] || [];
            const M = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const WD = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const date = new Date(viewYear, viewMonth, d);
            document.getElementById('modalTitle').textContent = WD[date.getDay()];
            document.getElementById('modalDate').textContent = `${M[viewMonth]} ${d}, ${viewYear}`;
            if (!habits.length) {
                document.getElementById('modalHabits').innerHTML = '<div class="modal-empty">No habits yet. Add some first!</div>';
            } else {
                document.getElementById('modalHabits').innerHTML = habits.map(h => {
                    const checked = done.includes(h.id);
                    return `
        <div class="modal-habit ${checked ? 'checked' : ''}"
          style="${checked ? `background:${h.color}18;border-color:${h.color}55` : ''}"
          onclick="toggleHabit('${h.id}','${k}')">
          <div class="modal-habit-left">
            <div class="habit-dot" style="background:${h.color}"></div>
            <div class="modal-habit-name">${esc(h.name)}</div>
          </div>
          <div class="checkmark" style="${checked ? `background:${h.color};border-color:${h.color}` : ''}">
            ${checked ? '✓' : ''}
          </div>
        </div>`;
                }).join('');
            }
            document.getElementById('dayModal').classList.add('open');
        }

        function closeDayModal(e) {
            if (e.target === document.getElementById('dayModal'))
                document.getElementById('dayModal').classList.remove('open');
        }
        function closeDayModalBtn() { document.getElementById('dayModal').classList.remove('open'); }

        async function toggleHabit(hid, dateK) {
            if (!completions[dateK]) completions[dateK] = [];
            const idx = completions[dateK].indexOf(hid);
            if (idx === -1) completions[dateK].push(hid);
            else completions[dateK].splice(idx, 1);
            await saveCompletion(dateK);
            openDay(selDay);
            renderStats(); renderHabits(); renderProgress(); renderCalendar();
        }

        // ── ADD HABIT ──
        function openAddModal() {
            document.getElementById('habitNameInput').value = '';
            selColor = COLORS[0]; renderColorPicker();
            document.getElementById('addModal').classList.add('open');
            setTimeout(() => document.getElementById('habitNameInput').focus(), 320);
        }
        function closeAddModal(e) {
            if (e.target === document.getElementById('addModal'))
                document.getElementById('addModal').classList.remove('open');
        }
        function closeAddModalBtn() { document.getElementById('addModal').classList.remove('open'); }

        function renderColorPicker() {
            document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
                `<div class="color-swatch ${c === selColor ? 'selected' : ''}" style="background:${c}" onclick="selectColor('${c}')"></div>`
            ).join('');
        }
        function selectColor(c) { selColor = c; renderColorPicker(); }

        async function saveHabit() {
            const name = document.getElementById('habitNameInput').value.trim();
            if (!name) { showToast('Please enter a habit name'); return; }
            const h = { id: Date.now().toString(), name, color: selColor, order: habits.length };
            habits.push(h);
            await idbPut('habits', h);
            closeAddModalBtn();
            render();
            showToast('Habit added ✓');
        }

        async function deleteHabit(id, e) {
            e.stopPropagation();
            habits = habits.filter(h => h.id !== id);
            await idbDelete('habits', id);
            const toUpdate = [];
            Object.keys(completions).forEach(k => {
                const before = completions[k].length;
                completions[k] = completions[k].filter(hid => hid !== id);
                if (completions[k].length !== before) toUpdate.push(k);
                if (!completions[k].length) delete completions[k];
            });
            for (const k of toUpdate) await saveCompletion(k);
            render(); showToast('Habit removed');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.getElementById('habitNameInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') saveHabit();
        });

        // ── INIT ──
        (async () => {
            try {
                await openDB();
                await loadData();
            } catch (err) {
                console.warn('IndexedDB unavailable:', err);
            }
            renderColorPicker();
            render();
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('mainApp').style.opacity = '1';
        })();
    </script>
</body>

</html>
